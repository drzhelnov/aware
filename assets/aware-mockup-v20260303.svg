<svg viewBox="0 0 820 206" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <!-- Diagonal hatch for warning flags -->
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <rect width="4" height="4" fill="white"/>
      <line x1="0" y1="0" x2="0" y2="4" stroke="black" stroke-width="1.5"/>
    </pattern>
    <!-- Clip paths to give title bars rounded top corners only -->
    <clipPath id="c1"><rect x="18" y="15" width="190" height="162" rx="8"/></clipPath>
    <clipPath id="c2"><rect x="315" y="15" width="190" height="162" rx="8"/></clipPath>
    <clipPath id="c3"><rect x="612" y="15" width="190" height="162" rx="8"/></clipPath>
  </defs>

  <!-- White background -->
  <rect width="820" height="206" fill="white"/>

  <!-- ═══════════════════════════════════════════ -->
  <!--           SCREEN 1 — STUDY INTAKE          -->
  <!-- ═══════════════════════════════════════════ -->
  <!-- Window frame -->
  <rect x="18" y="15" width="190" height="162" rx="8" fill="white" stroke="black" stroke-width="2"/>
  <!-- Title bar (clipped to get rounded top corners) -->
  <g clip-path="url(#c1)">
    <rect x="18" y="15" width="190" height="27" fill="black"/>
    <text x="28" y="32.5" fill="white" font-size="8.5" font-weight="bold" letter-spacing="0.3">01</text>
    <text x="113" y="32.5" text-anchor="middle" fill="white" font-size="8" font-weight="bold" letter-spacing="1.5">STUDY INTAKE</text>
  </g>

  <!-- DOI Search bar -->
  <rect x="30" y="51" width="166" height="17" rx="8.5" fill="white" stroke="black" stroke-width="1.5"/>
  <!-- Magnifier circle -->
  <circle cx="42.5" cy="59.5" r="4.5" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="45.7" y1="62.7" x2="49" y2="66" stroke="black" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Placeholder text lines inside field -->
  <rect x="54" y="56.5" width="68" height="3" rx="1.5" fill="black"/>
  <rect x="54" y="62" width="44" height="2.5" rx="1.25" fill="black"/>

  <!-- Fetch indicator: small downward arrow -->
  <line x1="113" y1="72" x2="113" y2="77" stroke="black" stroke-width="1.5"/>
  <polygon points="109,74 117,74 113,79" fill="black"/>

  <!-- Metadata fields (solid black = auto-populated) -->
  <!-- Field 1: Title -->
  <rect x="30" y="82" width="166" height="11" rx="2" fill="black"/>
  <!-- Field 2: Authors -->
  <rect x="30" y="96" width="130" height="11" rx="2" fill="black"/>
  <!-- Field 3: Year -->
  <rect x="30" y="110" width="54" height="11" rx="2" fill="black"/>
  <!-- Field 3b: Source -->
  <rect x="90" y="110" width="106" height="11" rx="2" fill="black"/>

  <!-- Horizontal divider -->
  <line x1="30" y1="129" x2="196" y2="129" stroke="black" stroke-width="1"/>

  <!-- Perspective selector label -->
  <text x="30" y="141" fill="black" font-size="6.5" font-weight="bold" letter-spacing="1">PERSPECTIVE</text>

  <!-- 6 option pills in 3×2 grid — first pill selected (filled) -->
  <!-- Row 1 -->
  <rect x="30"  y="145" width="46" height="12" rx="6" fill="black"/>
  <rect x="81"  y="145" width="46" height="12" rx="6" fill="white" stroke="black" stroke-width="1.2"/>
  <rect x="132" y="145" width="46" height="12" rx="6" fill="white" stroke="black" stroke-width="1.2"/>
  <!-- Row 2 -->
  <rect x="30"  y="160" width="46" height="12" rx="6" fill="white" stroke="black" stroke-width="1.2"/>
  <rect x="81"  y="160" width="46" height="12" rx="6" fill="white" stroke="black" stroke-width="1.2"/>
  <rect x="132" y="160" width="46" height="12" rx="6" fill="white" stroke="black" stroke-width="1.2"/>

  <!-- Step label below screen -->
  <text x="113" y="196" text-anchor="middle" fill="black" font-size="9" font-weight="bold" letter-spacing="1">1  ·  INTAKE</text>


  <!-- ═══════════════════════ ARROW 1→2 ═══════════════════════ -->
  <line x1="213" y1="96" x2="307" y2="96" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <polygon points="306,90 318,96 306,102" fill="black"/>


  <!-- ═══════════════════════════════════════════ -->
  <!--           SCREEN 2 — CHECKLIST             -->
  <!-- ═══════════════════════════════════════════ -->
  <!-- Window frame -->
  <rect x="315" y="15" width="190" height="162" rx="8" fill="white" stroke="black" stroke-width="2"/>
  <!-- Title bar -->
  <g clip-path="url(#c2)">
    <rect x="315" y="15" width="190" height="27" fill="black"/>
    <text x="325" y="32.5" fill="white" font-size="8.5" font-weight="bold" letter-spacing="0.3">02</text>
    <text x="410" y="32.5" text-anchor="middle" fill="white" font-size="8" font-weight="bold" letter-spacing="1.5">CHECKLIST</text>
  </g>

  <!-- PREFILLED items (from Screen 1): solid black checkbox + solid text bar -->
  <!-- Item 1 -->
  <rect x="328" y="51" width="12" height="12" rx="1.5" fill="black"/>
  <polyline points="329.5,57.2 333.5,61 341,53.5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="348" y="53.5" width="130" height="6" rx="2" fill="black"/>

  <!-- Item 2 -->
  <rect x="328" y="68" width="12" height="12" rx="1.5" fill="black"/>
  <polyline points="329.5,74.2 333.5,78 341,70.5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="348" y="70.5" width="112" height="6" rx="2" fill="black"/>

  <!-- Item 3 -->
  <rect x="328" y="85" width="12" height="12" rx="1.5" fill="black"/>
  <polyline points="329.5,91.2 333.5,95 341,87.5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="348" y="87.5" width="120" height="6" rx="2" fill="black"/>

  <!-- EMPTY items (to be filled manually or via AI): outline checkbox + outline bar -->
  <!-- Item 4 -->
  <rect x="328" y="102" width="12" height="12" rx="1.5" fill="white" stroke="black" stroke-width="1.5"/>
  <rect x="348" y="104.5" width="130" height="6" rx="2" fill="white" stroke="black" stroke-width="1"/>

  <!-- Item 5 -->
  <rect x="328" y="119" width="12" height="12" rx="1.5" fill="white" stroke="black" stroke-width="1.5"/>
  <rect x="348" y="121.5" width="110" height="6" rx="2" fill="white" stroke="black" stroke-width="1"/>

  <!-- Item 6 -->
  <rect x="328" y="136" width="12" height="12" rx="1.5" fill="white" stroke="black" stroke-width="1.5"/>
  <rect x="348" y="138.5" width="122" height="6" rx="2" fill="white" stroke="black" stroke-width="1"/>

  <!-- Divider -->
  <line x1="328" y1="155" x2="492" y2="155" stroke="black" stroke-width="1"/>

  <!-- AI Prompt copy button -->
  <rect x="355" y="159" width="110" height="14" rx="3" fill="black"/>
  <text x="410" y="170" text-anchor="middle" fill="white" font-size="7" font-weight="bold" letter-spacing="0.8">AI PROMPT  ↗</text>

  <!-- Step label -->
  <text x="410" y="196" text-anchor="middle" fill="black" font-size="9" font-weight="bold" letter-spacing="1">2  ·  CHECKLIST</text>


  <!-- ═══════════════════════ ARROW 2→3 ═══════════════════════ -->
  <line x1="510" y1="96" x2="604" y2="96" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <polygon points="603,90 615,96 603,102" fill="black"/>


  <!-- ═══════════════════════════════════════════ -->
  <!--           SCREEN 3 — FLAG REPORT           -->
  <!-- ═══════════════════════════════════════════ -->
  <!-- Window frame -->
  <rect x="612" y="15" width="190" height="162" rx="8" fill="white" stroke="black" stroke-width="2"/>
  <!-- Title bar -->
  <g clip-path="url(#c3)">
    <rect x="612" y="15" width="190" height="27" fill="black"/>
    <text x="622" y="32.5" fill="white" font-size="8.5" font-weight="bold" letter-spacing="0.3">03</text>
    <text x="707" y="32.5" text-anchor="middle" fill="white" font-size="8" font-weight="bold" letter-spacing="1.5">FLAG REPORT</text>
  </g>

  <!-- ── PROBLEM FLAGS (solid black pennant) ── -->
  <!-- Flag 1 -->
  <line x1="628" y1="48" x2="628" y2="67" stroke="black" stroke-width="1.5"/>
  <polygon points="628,48 651,54.5 628,61" fill="black"/>
  <rect x="658" y="50.5" width="127" height="6" rx="2" fill="black"/>
  <rect x="658" y="60"   width="95"  height="3.5" rx="1.75" fill="black"/>

  <!-- Flag 2 -->
  <line x1="628" y1="71" x2="628" y2="90" stroke="black" stroke-width="1.5"/>
  <polygon points="628,71 651,77.5 628,84" fill="black"/>
  <rect x="658" y="73.5" width="112" height="6" rx="2" fill="black"/>
  <rect x="658" y="83"   width="80"  height="3.5" rx="1.75" fill="black"/>

  <!-- Dashed separator -->
  <line x1="624" y1="97" x2="794" y2="97" stroke="black" stroke-width="0.75" stroke-dasharray="3,2.5"/>

  <!-- ── WARNING FLAGS (hatched pennant) ── -->
  <!-- Flag 3 -->
  <line x1="628" y1="102" x2="628" y2="121" stroke="black" stroke-width="1.5"/>
  <polygon points="628,102 651,108.5 628,115" fill="url(#hatch)" stroke="black" stroke-width="1.2"/>
  <rect x="658" y="104.5" width="120" height="6" rx="2" fill="black"/>
  <rect x="658" y="114"   width="90"  height="3.5" rx="1.75" fill="black"/>

  <!-- Flag 4 -->
  <line x1="628" y1="125" x2="628" y2="144" stroke="black" stroke-width="1.5"/>
  <polygon points="628,125 651,131.5 628,138" fill="url(#hatch)" stroke="black" stroke-width="1.2"/>
  <rect x="658" y="127.5" width="105" height="6" rx="2" fill="black"/>
  <rect x="658" y="137"   width="75"  height="3.5" rx="1.75" fill="black"/>

  <!-- Dashed separator -->
  <line x1="624" y1="150" x2="794" y2="150" stroke="black" stroke-width="0.75" stroke-dasharray="3,2.5"/>

  <!-- ── STRENGTH FLAG (outlined white pennant) ── -->
  <!-- Flag 5 -->
  <line x1="628" y1="155" x2="628" y2="173" stroke="black" stroke-width="1.5"/>
  <polygon points="628,155 651,161.5 628,168" fill="white" stroke="black" stroke-width="1.5"/>
  <rect x="658" y="157.5" width="118" height="6" rx="2" fill="black"/>
  <rect x="658" y="167"   width="88"  height="3.5" rx="1.75" fill="black"/>

  <!-- Step label -->
  <text x="707" y="196" text-anchor="middle" fill="black" font-size="9" font-weight="bold" letter-spacing="1">3  ·  FLAG REPORT</text>

</svg>
